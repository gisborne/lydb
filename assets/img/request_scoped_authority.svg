<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Request-scoped authority flow through client, middleware, and Postgres</title>
  <desc id="desc">The client holds an authorization token, builds an encrypted request, middleware forwards the opaque payload, and Postgres decrypts, validates, sets context, and invokes a broker function.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#222"/>
    </marker>
    <style>
      .box { fill: #fff; stroke: #222; stroke-width: 2; rx: 14; }
      .header { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111; }
      .subhead { font: 600 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #222; }
      .text { font: 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #222; }
      .mono { font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; fill: #222; }
      .small { font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #444; }
      .arrow { stroke: #222; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 7 6; }
      .payload { fill: #f7f7f7; stroke: #555; stroke-width: 1.5; rx: 10; }
      .note { fill: #fbfbfb; stroke: #999; stroke-width: 1; rx: 8; }
    </style>
  </defs>

  <!-- Column boxes -->
  <rect class="box" x="50" y="60" width="310" height="500"/>
  <rect class="box" x="445" y="60" width="310" height="500"/>
  <rect class="box" x="840" y="60" width="310" height="500"/>

  <!-- Headers -->
  <text class="header" x="205" y="105" text-anchor="middle">Client</text>
  <text class="small" x="205" y="130" text-anchor="middle">browser / app / CLI</text>

  <text class="header" x="600" y="105" text-anchor="middle">Middleware</text>
  <text class="small" x="600" y="130" text-anchor="middle">dumb broker / public-facing</text>

  <text class="header" x="995" y="105" text-anchor="middle">Postgres</text>
  <text class="small" x="995" y="130" text-anchor="middle">authority boundary</text>

  <!-- Client content -->
  <text class="subhead" x="80" y="175">Holds</text>
  <rect class="payload" x="80" y="190" width="250" height="55"/>
  <text class="mono" x="100" y="224">auth_token</text>
  <text class="small" x="190" y="224">opaque / revocable</text>

  <text class="subhead" x="80" y="285">Builds encrypted request</text>
  <rect class="payload" x="80" y="305" width="250" height="160"/>
  <text class="mono" x="100" y="335">{</text>
  <text class="mono" x="120" y="360">function:   "create_invoice",</text>
  <text class="mono" x="120" y="385">arguments:  { ... },</text>
  <text class="mono" x="120" y="410">timestamp:  "2026-04-26...",</text>
  <text class="mono" x="120" y="435">auth_token: &lt;opaque&gt;</text>
  <text class="mono" x="100" y="460">}</text>

  <text class="small" x="80" y="500">Encrypted for Postgres</text>
  <text class="small" x="80" y="520">using database public key</text>

  <!-- Middleware content -->
  <text class="subhead" x="475" y="195">Receives opaque payload</text>
  <rect class="payload" x="475" y="215" width="250" height="95"/>
  <text class="mono" x="500" y="253">ciphertext</text>
  <text class="small" x="500" y="280">cannot read or mint authority</text>

  <text class="subhead" x="475" y="360">Forwards to Postgres</text>
  <rect class="note" x="475" y="380" width="250" height="80"/>
  <text class="text" x="500" y="412">No business logic required</text>
  <text class="text" x="500" y="438">No standing DB authority</text>

  <!-- Postgres content -->
  <text class="subhead" x="870" y="175">Broker function</text>
  <rect class="payload" x="870" y="195" width="250" height="75"/>
  <text class="mono" x="895" y="227">SELECT broker(ciphertext)</text>
  <text class="small" x="895" y="250">or equivalent RPC call</text>

  <text class="subhead" x="870" y="315">Inside Postgres</text>
  <rect class="payload" x="870" y="335" width="250" height="145"/>
  <text class="text" x="895" y="365">1. decrypt payload</text>
  <text class="text" x="895" y="392">2. validate token + time</text>
  <text class="text" x="895" y="419">3. set LOCAL context</text>
  <text class="mono" x="915" y="445">app.tenant_id</text>
  <text class="mono" x="915" y="468">app.user_id</text>

  <text class="subhead" x="870" y="520">Then invoke</text>
  <text class="mono" x="870" y="545">function(args)</text>

  <!-- Arrows -->
  <path class="arrow" d="M360 360 C390 360, 415 260, 445 260"/>
  <text class="small" x="382" y="315">encrypted request</text>

  <path class="arrow" d="M755 260 C785 260, 810 232, 840 232"/>
  <text class="small" x="776" y="215">forward only</text>

  <path class="arrow dashed" d="M995 270 L995 330"/>
  <path class="arrow dashed" d="M995 480 L995 510"/>

  <!-- Footer note -->
  <rect class="note" x="185" y="585" width="830" height="42"/>
  <text class="text" x="600" y="612" text-anchor="middle">
    Authority is derived per request inside Postgres; middleware never receives standing authority to query data.
  </text>
</svg>